# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

submodules:
  include: all
  # recursive: true  # only needed if harpy_notebooks itself has submodules


build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

sphinx:
  configuration: docs/conf.py
  # disable this for more lenient docs builds
  # fail_on_warning: true
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
